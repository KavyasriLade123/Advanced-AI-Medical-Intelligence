# Render Blueprint — full stack on one Free Web Service (UI + API)
services:
  - type: web
    name: medintel-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: CORS_ORIGINS
        value: https://advanced-ai-medical-intelligence-jy.vercel.app,https://advanced-ai-medical-intelligence-4og2.onrender.com
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_MODEL
        value: gpt-4o-mini
