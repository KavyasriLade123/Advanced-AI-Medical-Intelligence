# Render Blueprint — MedIntel API (Free plan)
# Dashboard: New → Web Service → Docker → Root Directory = backend
# Or: New → Blueprint → this file

services:
  - type: web
    name: medintel-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: CORS_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_MODEL
        value: gpt-4o-mini
