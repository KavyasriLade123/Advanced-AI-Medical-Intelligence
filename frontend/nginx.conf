server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        client_max_body_size 25m;
    }

    location / {
        try_files $uri /index.html;
    }
}
